jobs:
- job: Skia_GTK
  cancelTimeoutInMinutes: 0
  displayName: 'Skia GTK'
  container: unoplatform/wasm-build:3.0

  pool:
    vmImage: 'ubuntu-latest'

  variables:
    GTK_RUNTIME_URL: https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2020-07-15/gtk3-runtime-3.24.20-2020-07-15-ts-win64.exe
    ArtifactName: skia-gtk
    ProjectPath: src/samples/SamplesApp/SamplesApp

  steps:
  - checkout: self
    clean: 'true'

  - template: templates/dotnet-install.yml
  - template: templates/canary-updater.yml
  - template: templates/gitversion.yml

  - powershell: dotnet msbuild $(ProjectPath)/SamplesApp.csproj /r /m /p:Configuration=Release /p:TargetFrameworkOverride=net9.0-desktop /detailedsummary /m /bl:$(build.artifactstagingdirectory)/themes-build-$(ArtifactName).binlog
    displayName: Build Desktop Head

  - task: CopyFiles@2
    displayName: 'Publish Skia.Desktop Binaries'
    inputs:
      SourceFolder: $(Build.SourcesDirectory)/$(ProjectPath)/bin/Release/net9.0-desktop
      Contents: '**/*.*'
      TargetFolder: $(build.artifactstagingdirectory)/skia-desktop-build
      CleanTargetFolder: false
      OverWrite: false
      flattenFolders: false

  - task: PublishBuildArtifacts@1
    condition: always()
    inputs:
      ArtifactName: $(ArtifactName)
